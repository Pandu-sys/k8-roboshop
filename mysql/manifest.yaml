apiVersion: v1
kind: Secret
metadata:
   name: mysql
   namespace: roboshop
type: Opaque
data: 
  MYSQL_ALLOW_EMPY_PASSWORD: "eWVzCg=="
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      tier: db
      component: mysql
  template:
    metadata:
      labels:
        project: roboshop
        tier: db
        component: mysql
    spec:
      containers:
      - name: mysql
        image: pandu15/mysql:v2
        envFrom:
        - secretRef:
            name: mysql
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: roboshop
  # servicer labels
  labels:
    project: roboshop
    environment: dev
spec:
# service uses the below labels to select the pods
  selector:
    project: roboshop
    tier: db
    component: mysql
  ports:
   - protocol: TCP
     port: 3306 # service port
     targetPort: 3306 # container port