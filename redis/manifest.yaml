apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: roboshop
  # these are the labels related to deployment resource
  labels:
    project: roboshop
    tier: db
    component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      tier: db
      component: redis
  template:
    metadata:
      labels:
        project: roboshop
        tier: db
        component: redis
    spec:
      containers:
      - name: redis
        image: redis:7
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: roboshop
  # servicer labels
  labels:
    project: roboshop
    environment: dev
spec:
# service uses the below labels to select the pods
  selector:
    project: roboshop
    tier: db
    component: redis
  ports:
   - protocol: TCP
     port: 6379 # service port
     targetPort: 6379 # container port