apiVersion: v1
kind: ConfigMap
metadata:
   name: shipping
   namespace: roboshop
data:
  CART_ENDPOINT: cart:8080  
  DB_HOST: mysql
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipping
  namespace: roboshop
  # these are the labels related to deployment resource
  labels:
    project: roboshop
    tier: backend
    component: shipping
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      tier: backend
      component: shipping
  template:
    metadata:
      labels:
        project: roboshop
        tier: backend
        component: shipping
    spec:
  template:
    spec:
      containers:
      - name: shipping
        image: pandu15/shipping:v2
        ports:
        - name: liveness-port
          containerPort: 8080

        startupProbe:
          httpGet:
            path: /health
            port: liveness-port
          failureThreshold: 12
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /health
            port: liveness-port
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /health
            port: liveness-port
          periodSeconds: 10

        envFrom:
        - configMapRef:
            name: shipping
---
apiVersion: v1
kind: Service
metadata:
  name: shipping
  namespace: roboshop
  # servicer labels
  labels:
    project: roboshop
    environment: dev
spec:
# service uses the below labels to select the pods
  selector:
    project: roboshop
    tier: backend
    component: shipping
  ports:
   - protocol: TCP
     port: 8080 # service port
     targetPort: 8080 # container port